<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="7cf1eff9d6d602b5">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Vaaradi Web Studio</title>
    <link rel="icon" type="image/png" href="icon.png?v=2">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        accent: '#22d3ee',
                        'bg-dark': '#0f172a',
                        'bg-light': '#f5f7fb'
                    }
                }
            }
        }
    </script>
    <script src="data.js"></script>
    <script src="services.js"></script>
    <script src="projects.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-black dark:text-slate-100 transition-colors duration-300">
    <header id="main-header"></header>
    
    <main>
        <section id="services-list"></section>
        <script>
function renderFullServices() {
    const container = document.getElementById('services-list');
    if (!container) return;

    const rowIcons = ['fa-bolt', 'fa-rocket', 'fa-crown', 'fa-fire', 'fa-gem', 'fa-star'];

    container.innerHTML = `
        <div class="relative overflow-hidden pt-20 pb-12 mb-16 border-b border-gray-100 dark:border-slate-800">
            <!-- Glow background for header -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-full bg-[radial-gradient(ellipse_at_top,_rgba(59,130,246,0.15)_0%,_transparent_70%)] pointer-events-none"></div>
            
            <div class="max-w-[1100px] mx-auto px-5 relative z-10 text-center space-y-6">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-50 dark:bg-blue-950/60 border border-blue-200 dark:border-blue-800 text-blue-600 dark:text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] animate-fade-in">
                    <i class="fa-solid fa-tags"></i> Transparent Pricing
                </div>
                <h1 class="text-4xl md:text-6xl font-black dark:text-white tracking-tighter">
                    Website Development <br class="hidden md:block"/> <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-violet-500">Services & Pricing</span>
                </h1>
                <p class="text-lg md:text-xl text-gray-500 dark:text-slate-400 max-w-2xl mx-auto font-medium">
                    Clear pricing with simple explanations. No hidden fees, no confusing jargon.
                </p>
            </div>
        </div>

        <div class="max-w-[1100px] mx-auto px-5 pb-24 space-y-32">
            ${servicesData.map((cat, cIndex) => `
                <section class="space-y-12 relative">
                    <!-- Subtle category separator -->
                    <div class="absolute -top-12 left-0 w-8 h-1.5 bg-gradient-to-r from-blue-500 to-violet-500 rounded-full"></div>
                    
                    <div class="space-y-4 pt-6">
                        <h2 class="text-3xl md:text-4xl font-black dark:text-white tracking-tight">${cat.category}</h2>
                        <p class="text-gray-500 dark:text-slate-400 text-lg leading-relaxed max-w-3xl">${cat.description}</p>
                    </div>
                    
                    ${cat.type === 'cards' ? `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
                            ${cat.items.map((item, i) => `
                                <a href="contact.html?service=${encodeURIComponent(item.title)}" class="card-tilt group flex flex-col p-8 rounded-3xl bg-white dark:bg-black border ${i === 1 ? 'border-blue-500 dark:border-blue-500 shadow-2xl shadow-blue-500/10' : 'border-gray-200 dark:border-slate-800'} transition-all hover:border-blue-500/50 hover:shadow-xl relative overflow-hidden block">
                                    ${i === 1 ? `<div class="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-blue-500 to-violet-500"></div><span class="absolute top-4 right-4 bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full shadow-sm">Popular</span>` : ''}
                                    
                                    <div class="mb-8">
                                        <h3 class="text-2xl font-black mb-2 dark:text-white group-hover:text-blue-500 transition-colors">${item.title}</h3>
                                        <div class="text-4xl font-black text-gray-900 dark:text-white tracking-tighter mt-4">
                                            <span class="text-[11px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-widest block mb-1">Starting At</span>
                                            ${item.price.replace('Starting ', '')}
                                        </div>
                                    </div>
                                    
                                    <ul class="space-y-4 flex-1 mb-8">
                                        ${item.features.map(f => `
                                            <li class="flex items-start gap-4 text-gray-600 dark:text-slate-400 text-sm">
                                                <div class="w-6 h-6 rounded-full bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center shrink-0 text-blue-500 mt-0.5">
                                                    <i class="fa-solid fa-check text-xs"></i>
                                                </div>
                                                <span class="leading-relaxed font-medium">${f.replace(/<b>/g, "<strong class='text-gray-900 dark:text-white'>").replace(new RegExp("</b>", "g"), "</strong>")}</span>
                                            </li>
                                        `).join('')}
                                    </ul>
                                    
                                    <span class="w-full py-4 rounded-xl font-black text-center text-sm transition-all duration-300 block ${i === 1 ? 'bg-gradient-to-r from-blue-600 to-violet-600 text-white shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-1' : 'bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-white hover:bg-gray-100 dark:hover:bg-slate-800 border border-transparent hover:border-gray-200 dark:hover:border-slate-700'}">
                                        Get Started
                                    </span>
                                </a>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="flex flex-col gap-4">
                            ${cat.items.map((item, i) => `
                                <a href="contact.html?service=${encodeURIComponent(item.title)}" class="group flex flex-col md:flex-row items-start md:items-center justify-between p-6 md:p-8 rounded-3xl bg-white dark:bg-black/40 border border-gray-100 dark:border-slate-800 shadow-sm hover:shadow-2xl hover:shadow-blue-500/5 hover:border-blue-500/30 hover:-translate-y-1 transition-all duration-300 gap-6 cursor-pointer block">
                                    <div class="flex flex-col md:flex-row md:items-center gap-6 flex-1 w-full">
                                        <div class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-slate-900/80 flex items-center justify-center shrink-0 text-gray-400 dark:text-slate-500 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300 shadow-inner group-hover:scale-110">
                                            <i class="fa-solid ${rowIcons[i % rowIcons.length]} text-2xl"></i>
                                        </div>
                                        <div class="flex-1 pr-0 md:pr-8">
                                            <h3 class="text-xl md:text-2xl font-black text-gray-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${item.title}</h3>
                                            ${item.meaning ? `<p class="mt-2 text-sm text-gray-500 dark:text-slate-400 leading-relaxed font-medium">${item.meaning}</p>` : ''}
                                        </div>
                                    </div>
                                    <div class="text-left md:text-right shrink-0 w-full md:w-auto flex md:flex-col items-center md:items-end justify-between md:justify-center border-t md:border-t-0 border-gray-100 dark:border-slate-800 pt-5 md:pt-0 mt-2 md:mt-0">
                                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-slate-500 mb-1 hidden md:block">Starting From</span>
                                        <div class="text-2xl font-black text-gray-900 dark:text-white group-hover:text-blue-500 transition-colors">${item.price.replace('Starting ', '').replace(' / year', '<span class="text-xs text-gray-400 font-bold ml-1">/ yr</span>')}</div>
                                        <span class="md:hidden px-6 py-2.5 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-bold text-xs uppercase tracking-wider border border-transparent hover:border-blue-200 block">Select</span>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    `}
                </section>
            `).join('')}
        </div>
    `;
}

renderFullServices();
    </script>
    </main>


    <footer id="main-footer"></footer>

    <script src="script.js"></script>
</body>
</html>
