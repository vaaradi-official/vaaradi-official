<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Vaaradi Web Studio</title>
    <link rel="icon" type="image/png" href="icon.png?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        accent: '#22d3ee',
                        'bg-dark': '#0f172a',
                        'bg-light': '#f5f7fb'
                    }
                }
            }
        }
    </script>
    <script src="data.js"></script>
    <script src="services.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-black dark:text-slate-100 transition-colors duration-300">
    <header id="main-header"></header>
    
    <main>
        <section id="contact-content"></section>
        <script>
function renderContact() {
    const container = document.getElementById('contact-content');
    if (!container) return;

    container.innerHTML = `
        <div class="max-w-[1100px] mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-16 py-20">
            <div class="reveal reveal-left space-y-12">
                <div>
                    <h2 class="text-4xl font-black mb-4 dark:text-white">Let's Build<br><span class="text-shimmer">Something Great</span></h2>
                    <p class="text-xl text-gray-500 dark:text-slate-400 leading-relaxed">Have a project in mind? We'd love to help you grow your business online.</p>
                </div>
                
                <div class="space-y-8">
                    <a href="mailto:${siteData.email}" class="relative z-10 flex items-center gap-5 group cursor-pointer hover:text-blue-500 transition-colors">
                        <div class="w-12 h-12 rounded-2xl bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center transition-all group-hover:bg-blue-100 group-hover:scale-110">
                            <i class="fa-solid fa-envelope text-blue-500 text-xl"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Email Address</p>
                            <p class="text-lg font-bold dark:text-white border-b border-transparent group-hover:border-blue-500/30 transition-all">${siteData.email}</p>
                        </div>
                    </a>
                    <a href="tel:${siteData.phone.replace(/\s/g, '')}" class="flex items-center gap-5 group cursor-pointer hover:text-violet-500 transition-colors">
                        <div class="w-12 h-12 rounded-2xl bg-violet-50 dark:bg-violet-900/30 flex items-center justify-center transition-all group-hover:bg-violet-100 group-hover:scale-110">
                            <i class="fa-solid fa-phone text-violet-500 text-xl"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Phone Number</p>
                            <p class="text-lg font-bold dark:text-white">${siteData.phone}</p>
                        </div>
                    </a>
                </div>
                
                <div class="space-y-4">
                    <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest">Find Us Online</h3>
                    <div class="flex gap-4">
                        ${renderSocialLinksMarkup()}
                    </div>
                </div>
            </div>
            
            <div class="reveal reveal-right bg-white dark:bg-slate-800/50 p-10 rounded-3xl border border-gray-100 dark:border-slate-800 shadow-xl backdrop-blur-sm">
                <form id="contact-form" class="space-y-6">
                    <div class="space-y-2">
                        <label for="contact-name" class="text-sm font-black text-gray-700 dark:text-slate-300 ml-1 cursor-pointer tracking-wide">Full Name</label>
                        <input type="text" id="contact-name" name="name" placeholder="Your name" required class="w-full px-6 py-4 rounded-2xl bg-gray-50 dark:bg-black border border-gray-100 dark:border-slate-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:shadow-xl dark:text-white transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label for="contact-email" class="text-sm font-black text-gray-700 dark:text-slate-300 ml-1 cursor-pointer tracking-wide">Email Address</label>
                        <input type="email" id="contact-email" name="email" placeholder="you@company.com" required class="w-full px-6 py-4 rounded-2xl bg-gray-50 dark:bg-black border border-gray-100 dark:border-slate-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:shadow-xl dark:text-white transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label for="contact-message" class="text-sm font-black text-gray-700 dark:text-slate-300 ml-1 cursor-pointer tracking-wide">Tell Us About Your Project</label>
                        <textarea id="contact-message" name="message" rows="5" placeholder="What does your business do, and what do you need?" required class="w-full px-6 py-4 rounded-2xl bg-gray-50 dark:bg-black border border-gray-100 dark:border-slate-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:shadow-xl dark:text-white transition-all outline-none resize-none"></textarea>
                    </div>
                    <button type="submit" class="btn-pulse w-full py-5 rounded-2xl bg-green-500 text-white font-black text-base shadow-lg shadow-green-500/20 hover:shadow-green-500/40 hover:-translate-y-1 transition-all flex items-center justify-center gap-2">
                        <i class="fa-brands fa-whatsapp text-xl"></i> Send on WhatsApp
                    </button>
                </form>
            </div>
        </div>
    `;

    document.getElementById('contact-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('contact-name').value;
        const email = document.getElementById('contact-email').value;
        const message = document.getElementById('contact-message').value;
        
        const whatsappNumber = siteData.phone.replace(/\D/g, '');
        const formattedMessage = encodeURIComponent(`*New Inquiry from Website*\n\n*Name:* ${name}\n*Email:* ${email}\n*Message:* ${message}`);
        
        window.open(`https://wa.me/${whatsappNumber}?text=${formattedMessage}`, '_blank');
    });

    setTimeout(() => {
        const urlParams = new URL(window.location.href).searchParams;
        const service = urlParams.get('service');
        if (service) {
            const messageEl = document.getElementById('contact-message');
            if (messageEl && !messageEl.value) {
                messageEl.value = `Hi! I am interested in the "${service}" service. Could we discuss this further?`;
            }
        }
    }, 100);
}

renderContact();
    </script>
    </main>


    <footer id="main-footer"></footer>

    <script src="script.js"></script>
</body>
</html>
